<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>✨ Гороскоп · ALPROAILIFE</title>
    <style>
        :root {
            --bg-page: #080b14;
            --bg-phone: #0d1117;
            --bg-card: #161b24;
            --bg-input: #1c2230;
            --border: #252b38;
            --border-focus: #4a5cff;
            --text: #e2e5ec;
            --text-secondary: #9aa1b4;
            --text-muted: #6b7280;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.25);
            --green: #10b981;
            --red: #ef4444;
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.3), 0 0 1px rgba(255, 255, 255, 0.04);
            --font: 'Segoe UI', 'Inter', system-ui, sans-serif;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { height:100%; overflow:hidden; -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%; }
        body {
            font-family: var(--font);
            background: var(--bg-page);
            background-image: radial-gradient(ellipse at 50% 0%, rgba(139,92,246,0.08) 0%, transparent 60%),
                              radial-gradient(ellipse at 50% 100%, rgba(16,185,129,0.04) 0%, transparent 60%);
            display: flex; align-items:center; justify-content:center;
            min-height:100vh; min-height:100dvh; padding:8px; overflow:hidden;
            user-select:none; -webkit-user-select:none; touch-action:manipulation;
        }
        .phone-container {
            width:100%; max-width:400px; height:92vh; height:92dvh; max-height:870px;
            background: var(--bg-phone); border-radius: var(--radius-xl);
            display:flex; flex-direction:column; overflow:hidden; position:relative;
            box-shadow: 0 0 0 2px var(--border), 0 20px 60px rgba(0,0,0,0.55), 0 0 80px rgba(139,92,246,0.08);
        }
        .status-bar { display:flex; align-items:center; justify-content:space-between; padding:10px 18px 6px; font-size:11px; color:var(--text-muted); letter-spacing:0.3px; flex-shrink:0; }
        .status-bar .time { font-weight:600; color:var(--text-secondary); }
        .app-header { flex-shrink:0; padding:8px 16px 14px; text-align:center; border-bottom:1px solid var(--border); background:linear-gradient(180deg, var(--bg-phone) 60%, rgba(13,17,23,0.95) 100%); }
        .app-header .brand { display:inline-block; font-size:18px; font-weight:800; letter-spacing:0.6px; text-decoration:none; color:#fff; background:linear-gradient(135deg,#c084fc,#8b5cf6,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .app-header .subtitle { font-size:11px; color:var(--text-muted); letter-spacing:1.2px; text-transform:uppercase; margin-top:2px; }
        .scroll-content { flex:1; overflow-y:auto; padding:8px 12px 20px; scroll-behavior:smooth; }
        .page { display:none; animation:fadeSlideIn 0.2s ease; }
        .page.active { display:block; }
        @keyframes fadeSlideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .block-card { background:var(--bg-card); border-radius:var(--radius-lg); margin-bottom:10px; padding:16px; border:1px solid var(--border); box-shadow:var(--shadow-card); position:relative; }
        .zodiac-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
        .zodiac-btn { padding:10px 6px; border-radius:var(--radius-sm); background:var(--bg-input); border:1.5px solid var(--border); color:var(--text-secondary); font-size:12px; font-weight:600; cursor:pointer; transition:var(--transition); text-align:center; font-family:var(--font); }
        .zodiac-btn:active { transform:scale(0.96); }
        .zodiac-btn.selected { background:rgba(139,92,246,0.15); border-color:var(--accent); color:#c084fc; box-shadow:0 0 12px rgba(139,92,246,0.2); }
        .form-row { margin-bottom:10px; }
        .form-row label { display:block; font-size:12.5px; font-weight:600; color:var(--text-secondary); margin-bottom:5px; }
        .form-row input[type="text"] { width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1.5px solid var(--border); background:var(--bg-input); color:var(--text); font-size:14px; font-family:var(--font); outline:none; }
        .generate-btn { width:100%; padding:12px; border-radius:30px; font-weight:700; font-size:14px; background:linear-gradient(135deg,#8b5cf6,#7c3aed); color:white; border:none; cursor:pointer; transition:var(--transition); margin-top:6px; font-family:var(--font); box-shadow:0 4px 16px rgba(139,92,246,0.3); }
        .generate-btn:disabled { opacity:0.5; pointer-events:none; }
        .result-card { background:linear-gradient(145deg,#1a1f2e 0%,#121722 100%); border:2px solid #2a3050; border-radius:var(--radius-lg); padding:18px 16px; margin-top:6px; box-shadow:0 0 24px rgba(139,92,246,0.2); position:relative; overflow:hidden; }
        .result-card::before { content:''; position:absolute; top:-40px; right:-40px; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%); pointer-events:none; }
        .result-zodiac { font-size:28px; font-weight:800; color:#fff; margin-bottom:12px; }
        .result-line { font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
        .result-line strong { color:#c084fc; }
        .result-description { font-size:13px; color:var(--text); margin-top:10px; padding:10px 14px; background:rgba(255,255,255,0.03); border-radius:var(--radius-sm); border-left:3px solid var(--accent); line-height:1.6; }
        .tarot-link { display:inline-block; margin-top:8px; font-size:12px; color:#c084fc; text-decoration:underline; font-weight:600; }
        .loading-spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; margin-right:6px; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .error-message { color:var(--red); font-size:12px; margin-top:8px; }
        .page-footer-line { text-align:center; padding:8px 0 16px; font-size:10px; color:var(--text-muted); }
        .page-footer-line a { color:#c084fc; text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
<div class="phone-container">
    <div class="status-bar">
        <span class="time" id="statusTime">9:41</span>
        <span class="status-icons"><span class="status-dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);"></span> <span>●●●●○</span></span>
    </div>
    <div class="app-header">
        <a href="https://max.ru/alproailife" target="_blank" rel="noopener" class="brand">ALPROAILIFE</a>
        <div class="subtitle">ежедневный гороскоп</div>
    </div>
    <div class="scroll-content" id="scrollContent">
        <!-- PAGE 1 -->
        <div class="page active" id="page1">
            <div class="block-card">
                <div class="block-title">✨ Прогноз на день</div>
                <div class="block-subtitle">выберите знак зодиака</div>
                <div class="zodiac-grid" id="zodiacGrid"></div>
                <div class="form-row" id="apiKeyRow" style="display:none;">
                    <label>🔑 API-ключ DeepSeek (сохраняется локально):</label>
                    <input type="text" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
                    <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">Ключ хранится только в вашем браузере.</div>
                </div>
                <button class="generate-btn" id="generateBtn" disabled>🔮 Сгенерировать прогноз</button>
                <div id="errorMsg" class="error-message" style="display:none;"></div>
            </div>
            <div class="page-footer-line">
                <a href="https://max.ru/alproailife" target="_blank">Alexey's Career Notes 🧢 AI & Tech
            </div>
        </div>
        <!-- PAGE 2 -->
        <div class="page" id="page2">
            <div class="result-card" id="resultCard">
                <div class="result-zodiac" id="resultZodiac"></div>
                <div class="result-line" id="resultColor"></div>
                <div class="result-line" id="resultNumber"></div>
                <div class="result-line" id="resultTime"></div>
                <div class="result-line" id="resultTarot"></div>
                <div class="result-description" id="resultDescription"></div>
                <a class="tarot-link" id="tarotLink" href="https://horo.mail.ru/divination/tarot/card/" target="_blank">🃏 Карта дня на horo.mail.ru →</a>
            </div>
            <button class="generate-btn" onclick="goToPage(1)" style="margin-top:10px;">← Назад к выбору знака</button>
            <div class="page-footer-line">
                <a href="https://max.ru/alproailife" target="_blank">ALPROAILIFE</a> · Alexey's Career Notes 🧢 AI & Tech
            </div>
        </div>
    </div>
</div>
<script>
    // ---------- НАСТРОЙКА ----------
    const PROXY_URL = '';  // ← сюда вставьте URL вашего Cloudflare Worker (например, 'https://your-worker.workers.dev/api/generate')

    const ZODIAC = [
        {symbol:'♈',name:'Овен'},{symbol:'♉',name:'Телец'},{symbol:'♊',name:'Близнецы'},
        {symbol:'♋',name:'Рак'},{symbol:'♌',name:'Лев'},{symbol:'♍',name:'Дева'},
        {symbol:'♎',name:'Весы'},{symbol:'♏',name:'Скорпион'},{symbol:'♐',name:'Стрелец'},
        {symbol:'♑',name:'Козерог'},{symbol:'♒',name:'Водолей'},{symbol:'♓',name:'Рыбы'}
    ];
    let selectedZodiac = null;

    function init() {
        renderGrid();
        if (PROXY_URL) {
            document.getElementById('apiKeyRow').style.display = 'none';
        } else {
            document.getElementById('apiKeyRow').style.display = 'block';
            const savedKey = localStorage.getItem('ds_api_key');
            if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
        }
        checkReady();
        updateClock(); setInterval(updateClock,30000);
    }

    function renderGrid() {
        const grid = document.getElementById('zodiacGrid');
        grid.innerHTML = ZODIAC.map((z,i) => `<button class="zodiac-btn" data-index="${i}" onclick="selectZodiac(${i})">${z.symbol} ${z.name}</button>`).join('');
    }

    function selectZodiac(idx) {
        selectedZodiac = ZODIAC[idx];
        document.querySelectorAll('.zodiac-btn').forEach(b=>b.classList.remove('selected'));
        document.querySelector(`.zodiac-btn[data-index="${idx}"]`).classList.add('selected');
        checkReady();
    }

    function checkReady() {
        const apiKey = PROXY_URL ? true : localStorage.getItem('ds_api_key');
        document.getElementById('generateBtn').disabled = !(selectedZodiac && apiKey);
    }

    document.getElementById('apiKeyInput').addEventListener('input', function() {
        const val = this.value.trim();
        if (val) localStorage.setItem('ds_api_key', val);
        else localStorage.removeItem('ds_api_key');
        checkReady();
    });

    function goToPage(num) {
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById('page'+num).classList.add('active');
        document.getElementById('scrollContent').scrollTop = 0;
    }

    document.getElementById('generateBtn').addEventListener('click', async function() {
        if (!selectedZodiac) return;
        const apiKey = PROXY_URL ? null : localStorage.getItem('ds_api_key');
        if (!PROXY_URL && !apiKey) return;

        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Генерируем...';
        document.getElementById('errorMsg').style.display = 'none';

        try {
            const horoscope = await fetchHoroscope(selectedZodiac, apiKey);
            displayResult(horoscope);
        } catch(e) {
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('errorMsg').textContent = 'Ошибка: ' + e.message;
            btn.disabled = false;
            btn.textContent = '🔮 Сгенерировать прогноз';
        }
    });

    async function fetchHoroscope(zodiac, apiKey) {
        const prompt = `Ты — профессиональный астролог и таролог. Сгенерируй ежедневный гороскоп для знака зодиака ${zodiac.name} (${zodiac.symbol}) на сегодня, ${new Date().toLocaleDateString('ru-RU')}. Формат ответа строго:
Цвет: [название необычного цвета]
Счастливое число: [число от 1 до 99]
Счастливое время: [интервал времени]
Карта дня: [название карты Таро]
[Краткий прогноз на 2-3 предложения с практическим советом]`;

        const body = {
            model: 'deepseek-chat',
            messages: [
                {role:'system', content:'Ты — астролог и таролог. Отвечай строго по формату, без лишнего текста.'},
                {role:'user', content: prompt}
            ],
            temperature: 0.9,
            max_tokens: 300
        };

        let url, headers;
        if (PROXY_URL) {
            url = PROXY_URL;
            headers = {'Content-Type':'application/json'};
        } else {
            url = 'https://api.deepseek.com/chat/completions';
            headers = {
                'Content-Type':'application/json',
                'Authorization':'Bearer ' + apiKey
            };
        }

        const response = await fetch(url, {
            method:'POST',
            headers: headers,
            body: JSON.stringify(body)
        });

        if (!response.ok) {
            const err = await response.json().catch(()=>({}));
            throw new Error(err.error?.message || 'Ошибка API: '+response.status);
        }

        const data = await response.json();
        const text = data.choices[0].message.content.trim();
        return parseHoroscope(text, zodiac);
    }

    function parseHoroscope(text, zodiac) {
        const result = {
            zodiac: zodiac.symbol + ' ' + zodiac.name,
            color:'не определён', number:'—', time:'—', tarot:'—', description:''
        };
        const lines = text.split('\n').filter(l=>l.trim());
        for (const line of lines) {
            if (line.startsWith('Цвет:')) result.color = line.replace('Цвет:','').trim();
            else if (line.startsWith('Счастливое число:')) result.number = line.replace('Счастливое число:','').trim();
            else if (line.startsWith('Счастливое время:')) result.time = line.replace('Счастливое время:','').trim();
            else if (line.startsWith('Карта дня:')) result.tarot = line.replace('Карта дня:','').trim();
            else if (line && !line.startsWith('Цвет:') && !line.startsWith('Счастливое') && !line.startsWith('Карта')) result.description += line + ' ';
        }
        result.description = result.description.trim();
        return result;
    }

    function displayResult(h) {
        document.getElementById('resultZodiac').textContent = h.zodiac;
        document.getElementById('resultColor').innerHTML = '🎨 <strong>Цвет:</strong> ' + h.color;
        document.getElementById('resultNumber').innerHTML = '🔢 <strong>Счастливое число:</strong> ' + h.number;
        document.getElementById('resultTime').innerHTML = '⏰ <strong>Счастливое время:</strong> ' + h.time;
        document.getElementById('resultTarot').innerHTML = '🃏 <strong>Карта дня:</strong> ' + h.tarot;
        document.getElementById('resultDescription').textContent = h.description;
        goToPage(2);
        const btn = document.getElementById('generateBtn');
        btn.disabled = false;
        btn.textContent = '🔮 Сгенерировать прогноз';
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('statusTime').textContent = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
